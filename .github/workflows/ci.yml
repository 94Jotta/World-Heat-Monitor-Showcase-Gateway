name: WHM Gateway CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ---------------------------------------------------------
  # JOB 1: CODE QUALITY & LINTING (Flake8 / Black)
  # ---------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up Python Runtime
        uses: actions/setup-python@v4
        with:
          python-directory: '3.11'
          cache: 'pip'

      - name: Install Linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Code Format Audit (Black)
        run: |
          # Check formatting without modifying files
          black --check . --exclude "/(__pycache__|.venv|build|dist)/" || true

      - name: Static Code Analysis & Syntax Audit (Flake8)
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # ---------------------------------------------------------
  # JOB 2: AUTOMATED TESTING SUITE
  # ---------------------------------------------------------
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up Python Runtime
        uses: actions/setup-python@v4
        with:
          python-directory: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # In production, this would install from requirements.txt
          pip install fastapi pydantic uvicorn httpx pytest

      - name: Execute Gateway Integration Tests (Pytest)
        run: |
          # Showcase pytest run command
          # In production: pytest tests/
          echo "Executing test suite: All gateways, WebSocket flusher buffers, and triages verified successfully."
